name: 'jaffle_warehouse'
version: '0.1.0'
config-version: 2

profile: 'jaffle_warehouse'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

require-dbt-version: ">=1.9.0"

models:
  jaffle_warehouse:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      finance:
        +tags: ["finance"]
      marketing:
        +tags: ["marketing"]

seeds:
  jaffle_warehouse:
    +schema: raw
    +column_types:
      id: integer
    raw_orders:
      +column_types:
        order_date: date
    raw_payments:
      +column_types:
        amount_cents: integer

snapshots:
  jaffle_warehouse:
    +target_schema: snapshots

vars:
  payment_methods: ['credit_card', 'coupon', 'bank_transfer', 'gift_card']
