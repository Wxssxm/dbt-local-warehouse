name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: .

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Install dbt packages
        run: uv run dbt deps

      - name: Lint with sqlfluff
        run: uv run sqlfluff lint models/

      - name: dbt build (in-memory DuckDB)
        run: uv run dbt build --target ci --fail-fast

      - name: Generate static dbt docs
        run: |
          uv run dbt docs generate --static --target ci
          mkdir -p docs-site
          cp target/static_index.html docs-site/index.html

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
